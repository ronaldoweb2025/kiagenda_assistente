<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KiAgenda Assistente</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="extension-body popup-body">
  <main class="popup-shell">
    <section class="popup-card popup-brand-card">
      <p class="popup-badge">KiAgenda Assistente</p>
      <h1>Atendimento simples no WhatsApp</h1>
      <p class="popup-copy">Versao Essencial da extensao para organizar respostas em texto de forma pratica.</p>

      <div class="popup-status-row">
        <span class="status-dot"></span>
        <div>
          <strong>Extensao ativa</strong>
          <p>Status pronto para uso no WhatsApp Web.</p>
        </div>
      </div>

      <div class="popup-actions">
        <button id="openOptionsButton" class="primary-button" type="button">Abrir configuracoes</button>
        <button id="upgradeButton" class="success-button" type="button">Upgrade para Nuvem</button>
      </div>
    </section>

    <section class="popup-card popup-upgrade-card">
      <p class="popup-card-title">Upgrade para Nuvem</p>
      <p class="popup-copy">Deixe seu atendimento rodando 24h, sem depender do navegador aberto.</p>
    </section>
  </main>

  <script src="popup.js"></script>
</body>
</html>
